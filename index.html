<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MuGöl Erişim | Resmi Bağlantılar</title>
    
    <!-- Google Fonts: Nunito -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- FontAwesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <style>
        :root {
            /* Karanlık Mod (Varsayılan) */
            --bg-color: #090e17;
            --text-color: #f8fafc;
            --glass-bg: rgba(255, 255, 255, 0.04);
            --glass-border-top: rgba(255, 255, 255, 0.12);
            --glass-border-bottom: rgba(255, 255, 255, 0.02);
            --glass-hover: rgba(255, 255, 255, 0.09);
            --icon-bg: rgba(255, 255, 255, 0.06);
            --orb-1: #3b82f6; /* Mavi */
            --orb-2: #8b5cf6; /* Mor */
            --orb-3: #10b981; /* Zümrüt Yeşili */
            --shadow-color: rgba(0, 0, 0, 0.3);
        }

        /* Aydınlık Mod */
        body.light-mode {
            --bg-color: #f1f5f9;
            --text-color: #0f172a;
            --glass-bg: rgba(255, 255, 255, 0.65);
            --glass-border-top: rgba(255, 255, 255, 0.9);
            --glass-border-bottom: rgba(0, 0, 0, 0.03);
            --glass-hover: rgba(255, 255, 255, 0.85);
            --icon-bg: rgba(0, 0, 0, 0.04);
            --orb-1: #93c5fd;
            --orb-2: #c4b5fd;
            --orb-3: #6ee7b7;
            --shadow-color: rgba(0, 0, 0, 0.06);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Nunito', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-color);
            transition: background-color 0.6s ease, color 0.6s ease;
            position: relative;
            overflow-x: hidden;
            padding: 50px 20px;
        }

        /* Arka Plan Işıkları (Aurora) */
        .background-orbs {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            overflow: hidden; z-index: 0; pointer-events: none;
        }

        .orb {
            position: absolute; border-radius: 50%;
            filter: blur(100px); opacity: 0.45;
            animation: float 20s infinite alternate cubic-bezier(0.4, 0, 0.2, 1);
        }

        .orb-1 { background: var(--orb-1); width: 380px; height: 380px; top: -50px; left: -100px; }
        .orb-2 { background: var(--orb-2); width: 480px; height: 480px; bottom: -150px; right: -100px; animation-delay: -5s; }
        .orb-3 { background: var(--orb-3); width: 280px; height: 280px; top: 25%; left: 35%; animation-delay: -10s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(50px, -70px) scale(1.15); }
            100% { transform: translate(-40px, 40px) scale(0.85); }
        }

        .container {
            width: 100%; max-width: 420px;
            text-align: center; z-index: 10; position: relative;
        }

        /* Tema Değiştirici */
        .theme-toggle {
            position: absolute; top: 25px; right: 25px;
            background: var(--glass-bg);
            border-top: 1px solid var(--glass-border-top);
            border-left: 1px solid var(--glass-border-top);
            border-bottom: 1px solid var(--glass-border-bottom);
            border-right: 1px solid var(--glass-border-bottom);
            color: var(--text-color);
            width: 48px; height: 48px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            font-size: 18px; z-index: 100;
            box-shadow: 0 8px 20px var(--shadow-color);
        }
        
        .theme-toggle:hover { transform: scale(1.15) rotate(20deg); background: var(--glass-hover); }

        /* Profil ve Logo */
        .profile-wrapper {
            animation: fadeInUp 0.8s ease forwards; opacity: 0; transform: translateY(20px);
            margin-bottom: 35px;
        }

        .profile-img-container {
            position: relative; width: 135px; height: 135px; margin: 0 auto 20px auto;
        }

        .profile-img-container::before {
            content: ''; position: absolute; top: -5px; left: -5px; right: -5px; bottom: -5px;
            background: linear-gradient(135deg, var(--orb-1), var(--orb-2), var(--orb-3));
            border-radius: 50%; z-index: -1; filter: blur(14px);
            opacity: 0.75; animation: pulseGlow 4s infinite alternate;
        }

        @keyframes pulseGlow {
            0% { opacity: 0.5; transform: scale(0.95) rotate(0deg); }
            100% { opacity: 1; transform: scale(1.08) rotate(15deg); }
        }

        .profile-img {
            width: 100%; height: 100%; border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.7);
            background: var(--bg-color);
            overflow: hidden;
            box-shadow: 0 12px 35px var(--shadow-color);
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        .profile-img:hover { transform: scale(1.06); }

        .profile-img img {
            width: 100%; height: 100%;
            object-fit: cover; 
            object-position: center;
            transition: transform 0.6s ease;
        }

        .profile-img:hover img { transform: scale(1.12); }

        .title {
            font-size: 28px; font-weight: 800; margin-bottom: 6px;
            letter-spacing: 0.2px; display: flex; justify-content: center; align-items: center; gap: 8px;
        }

        .verified-badge { 
            color: #3b82f6; font-size: 19px; 
            filter: drop-shadow(0 0 6px rgba(59, 130, 246, 0.6));
            animation: badgePop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 1s both;
        }

        @keyframes badgePop {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .description { font-size: 16px; font-weight: 400; opacity: 0.85; letter-spacing: 0.3px; }

        /* Premium Link Butonları */
        .links-container { display: flex; flex-direction: column; gap: 18px; }

        .link-btn {
            display: flex; align-items: center; padding: 14px 22px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--glass-border-top);
            border-left: 1px solid var(--glass-border-top);
            border-bottom: 1px solid var(--glass-border-bottom);
            border-right: 1px solid var(--glass-border-bottom);
            border-radius: 24px; /* Daha yumuşak köşeler */
            text-decoration: none; color: var(--text-color);
            font-size: 16px; font-weight: 600;
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative; overflow: hidden; opacity: 0;
            transform: translateY(20px); animation: fadeInUp 0.6s ease forwards;
            box-shadow: 0 10px 30px var(--shadow-color);
        }

        /* Işık Parlama Efekti (Shine) */
        .link-btn::after {
            content: ''; position: absolute; top: 0; left: -100%;
            width: 50%; height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0) 100%);
            transform: skewX(-25deg); transition: all 0.7s ease;
        }

        .link-btn:hover::after { left: 200%; }
        .link-btn:hover {
            transform: translateY(-5px) scale(1.02);
            background: var(--glass-hover);
            box-shadow: 0 18px 40px var(--shadow-color);
        }

        /* İkon Kapsülü */
        .icon-wrapper {
            width: 44px; height: 44px; border-radius: 50%;
            background: var(--icon-bg); display: flex; justify-content: center; align-items: center;
            margin-right: 16px; font-size: 20px; transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .link-btn:hover .icon-wrapper { transform: scale(1.2) rotate(8deg); background: rgba(255,255,255,0.15); }
        body.light-mode .link-btn:hover .icon-wrapper { background: rgba(0,0,0,0.08); }

        .btn-text { flex: 1; text-align: left; letter-spacing: 0.3px; }

        .fa-chevron-right { font-size: 14px; opacity: 0.4; transition: all 0.3s ease; }
        .link-btn:hover .fa-chevron-right { opacity: 1; transform: translateX(6px); }

        /* Hover Renk Vurguları */
        .website:hover .icon-wrapper i { color: #3b82f6; filter: drop-shadow(0 0 8px rgba(59, 130, 246, 0.5)); }
        .instagram:hover .icon-wrapper i { color: #E1306C; filter: drop-shadow(0 0 8px rgba(225, 48, 108, 0.5)); }
        .facebook:hover .icon-wrapper i { color: #1877F2; filter: drop-shadow(0 0 8px rgba(24, 119, 242, 0.5)); }
        .youtube:hover .icon-wrapper i { color: #FF0000; filter: drop-shadow(0 0 8px rgba(255, 0, 0, 0.5)); }

        /* Animasyon Gecikmeleri */
        .link-btn:nth-child(1) { animation-delay: 0.2s; }
        .link-btn:nth-child(2) { animation-delay: 0.35s; }
        .link-btn:nth-child(3) { animation-delay: 0.5s; }
        .link-btn:nth-child(4) { animation-delay: 0.65s; }

        /* Paylaş Butonu */
        .share-btn {
            margin-top: 35px; background: transparent; 
            border: 1px solid var(--glass-border-bottom);
            color: var(--text-color); font-size: 15px; font-weight: 600;
            cursor: pointer; opacity: 0.7; transition: all 0.3s ease;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            width: 100%; padding: 14px; border-radius: 16px;
            animation: fadeInUp 0.6s ease forwards; animation-delay: 0.8s; opacity: 0;
        }

        .share-btn:hover { 
            opacity: 1; 
            background: var(--glass-bg); 
            transform: translateY(-3px); 
            border-color: var(--glass-border-top);
            box-shadow: 0 8px 20px var(--shadow-color);
        }

        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }

        /* Footer */
        .footer {
            margin-top: 40px; font-size: 14px; font-weight: 500; opacity: 0.5;
            animation: fadeInUp 0.6s ease forwards; animation-delay: 1s; opacity: 0;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <!-- Kutup Işıkları (Aurora) -->
    <div class="background-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <!-- Gece / Gündüz Butonu -->
    <button class="theme-toggle" id="themeToggleBtn" title="Temayı Değiştir">
        <i class="fas fa-sun" id="themeIcon"></i>
    </button>

    <div class="container">
        
        <!-- Logo ve Başlık -->
        <div class="profile-wrapper">
            <div class="profile-img-container">
                <div class="profile-img">
                    <img src="logo.png" alt="MuGöl Erişim Logo">
                </div>
            </div>
            <h1 class="title">
                MuGöl Erişim
                <i class="fas fa-check-circle verified-badge" title="Resmi Hesap"></i>
            </h1>
            <p class="description">Dijital dünyadaki tüm bağlantılarımız.</p>
        </div>

        <!-- Yönlendirme Linkleri -->
        <div class="links-container">
            
            <!-- Web Sitesi -->
            <a href="https://mugol-portal.github.io" target="_blank" class="link-btn website">
                <div class="icon-wrapper"><i class="fas fa-globe"></i></div>
                <span class="btn-text">Resmi Web Sitemiz</span>
                <i class="fas fa-chevron-right"></i>
            </a>

            <!-- Instagram -->
            <a href="https://www.instagram.com/mugol_portal?igsh=MXFqNWFmbnE1aGZsaw==" target="_blank" class="link-btn instagram">
                <div class="icon-wrapper"><i class="fab fa-instagram"></i></div>
                <span class="btn-text">Instagram</span>
                <i class="fas fa-chevron-right"></i>
            </a>

            <!-- Facebook -->
            <a href="https://www.facebook.com/share/1H6tTt3zSZ/" target="_blank" class="link-btn facebook">
                <div class="icon-wrapper"><i class="fab fa-facebook-f"></i></div>
                <span class="btn-text">Facebook</span>
                <i class="fas fa-chevron-right"></i>
            </a>

            <!-- YouTube -->
            <a href="https://youtube.com/@mugolportal?si=HmNCscBqMBJPVOCO" target="_blank" class="link-btn youtube">
                <div class="icon-wrapper"><i class="fab fa-youtube"></i></div>
                <span class="btn-text">YouTube</span>
                <i class="fas fa-chevron-right"></i>
            </a>
            
        </div>

        <!-- Paylaş Butonu -->
        <button class="share-btn" onclick="sharePage()">
            <i class="fas fa-share-nodes"></i>
            Bu Sayfayı Paylaş
        </button>

        <!-- Footer -->
        <div class="footer">
            &copy; 2026 MuGöl Erişim. Tüm Hakları Saklıdır.
        </div>
    </div>

    <!-- JavaScript İşlevleri -->
    <script>
        // Tema Ayarı
        const themeBtn = document.getElementById('themeToggleBtn');
        const themeIcon = document.getElementById('themeIcon');
        const body = document.body;

        themeBtn.addEventListener('click', () => {
            body.classList.toggle('light-mode');
            if(body.classList.contains('light-mode')) {
                themeIcon.classList.remove('fa-sun');
                themeIcon.classList.add('fa-moon');
            } else {
                themeIcon.classList.remove('fa-moon');
                themeIcon.classList.add('fa-sun');
            }
        });

        // Paylaşım Menüsü (Mobil uyumlu)
        function sharePage() {
            if (navigator.share) {
                navigator.share({
                    title: 'MuGöl Erişim',
                    text: 'MuGöl Erişim resmi bağlantılarına göz atın!',
                    url: window.location.href
                }).then(() => {
                    console.log('Başarıyla paylaşıldı');
                }).catch(console.error);
            } else {
                navigator.clipboard.writeText(window.location.href);
                alert("Bağlantı kopyalandı! Artık istediğiniz yere yapıştırabilirsiniz.");
            }
        }
    </script>
</body>
</html>
