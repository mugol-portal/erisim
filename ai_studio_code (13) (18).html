<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MuGöl Erişim | Resmi Bağlantılar</title>
    
    <!-- Google Fonts: Nunito -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- FontAwesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <style>
        :root {
            /* Karanlık Mod (Varsayılan) */
            --bg-color: #050b14;
            --text-color: #f8fafc;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-hover: rgba(255, 255, 255, 0.08);
            --orb-1: #3b82f6; /* Mavi */
            --orb-2: #8b5cf6; /* Mor */
            --orb-3: #10b981; /* Zümrüt Yeşili */
            --orb-4: #ec4899; /* Pembe Vurgu */
            --shadow-color: rgba(0, 0, 0, 0.5);
            
            /* Marka Renkleri */
            --color-web: #3b82f6;
            --color-ig-start: #f09433;
            --color-ig-end: #bc1888;
            --color-fb: #1877F2;
            --color-yt: #FF0000;
        }

        /* Aydınlık Mod */
        body.light-mode {
            --bg-color: #f1f5f9;
            --text-color: #0f172a;
            --glass-bg: rgba(255, 255, 255, 0.6);
            --glass-border: rgba(255, 255, 255, 0.8);
            --glass-hover: rgba(255, 255, 255, 0.9);
            --orb-1: #60a5fa;
            --orb-2: #a78bfa;
            --orb-3: #34d399;
            --orb-4: #f472b6;
            --shadow-color: rgba(0, 0, 0, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Nunito', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-color);
            transition: background-color 0.8s cubic-bezier(0.4, 0, 0.2, 1), color 0.8s ease;
            position: relative;
            overflow-x: hidden;
            padding: 50px 20px;
        }

        /* Premium Kumlanma (Noise) Dokusu */
        body::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.04; z-index: 1; pointer-events: none;
        }

        /* Arka Plan Işıkları (Aurora) */
        .background-orbs {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            overflow: hidden; z-index: 0; pointer-events: none;
        }

        .orb {
            position: absolute; border-radius: 50%;
            filter: blur(120px); opacity: 0.45;
            animation: float 25s infinite alternate cubic-bezier(0.4, 0, 0.2, 1);
        }

        .orb-1 { background: var(--orb-1); width: 400px; height: 400px; top: -10%; left: -10%; }
        .orb-2 { background: var(--orb-2); width: 500px; height: 500px; bottom: -20%; right: -10%; animation-delay: -5s; }
        .orb-3 { background: var(--orb-3); width: 300px; height: 300px; top: 30%; left: 40%; animation-delay: -10s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(60px, -80px) scale(1.2); }
            100% { transform: translate(-50px, 50px) scale(0.8); }
        }

        .container {
            width: 100%; max-width: 420px;
            text-align: center; z-index: 10; position: relative;
        }

        /* Tema Değiştirici */
        .theme-toggle {
            position: absolute; top: 25px; right: 25px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-color);
            width: 48px; height: 48px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            font-size: 18px; z-index: 100;
            box-shadow: 0 8px 25px var(--shadow-color);
        }
        
        .theme-toggle:hover { 
            transform: scale(1.15) rotate(25deg); 
            background: var(--glass-hover); 
            border-color: rgba(255,255,255,0.4);
            box-shadow: 0 12px 30px var(--shadow-color);
        }

        /* Profil ve Logo */
        .profile-wrapper {
            animation: springUp 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; 
            opacity: 0; transform: translateY(30px); margin-bottom: 35px;
        }

        .profile-img-container {
            position: relative; width: 145px; height: 145px; margin: 0 auto 20px auto;
            border-radius: 50%; padding: 4px;
        }

        /* Dönen Zengin Enerji Halkası */
        .profile-img-container::before {
            content: ''; position: absolute; inset: 0;
            background: conic-gradient(from 0deg, var(--orb-1), var(--orb-2), var(--orb-4), var(--orb-3), var(--orb-1));
            border-radius: 50%; z-index: -1; 
            animation: spinRing 5s linear infinite;
        }

        /* Halkaya ekstra dış parlama */
        .profile-img-container::after {
            content: ''; position: absolute; inset: -6px;
            background: conic-gradient(from 0deg, var(--orb-1), var(--orb-2), var(--orb-4), var(--orb-3), var(--orb-1));
            border-radius: 50%; z-index: -2; filter: blur(20px); opacity: 0.6;
            animation: spinRing 5s linear infinite;
        }

        @keyframes spinRing { 100% { transform: rotate(360deg); } }

        .profile-img {
            width: 100%; height: 100%; border-radius: 50%;
            border: 4px solid var(--bg-color); /* Arka planla kusursuz uyum */
            background: var(--bg-color); overflow: hidden;
            box-shadow: inset 0 0 25px rgba(0,0,0,0.6);
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        .profile-img:hover { transform: scale(1.05); }

        .profile-img img {
            width: 100%; height: 100%; object-fit: cover; object-position: center;
            transition: transform 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .profile-img:hover img { transform: scale(1.15) rotate(2deg); }

        .title {
            font-size: 30px; font-weight: 800; margin-bottom: 6px;
            letter-spacing: 0.2px; display: flex; justify-content: center; align-items: center; gap: 8px;
            background: linear-gradient(to right, #ffffff, #cce0ff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        body.light-mode .title {
            background: linear-gradient(to right, #0f172a, #3b82f6);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .verified-badge { 
            color: var(--color-web); font-size: 20px; 
            -webkit-text-fill-color: var(--color-web); /* Gradient title ezmesin diye */
            filter: drop-shadow(0 0 8px rgba(59, 130, 246, 0.6));
            animation: badgePop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 1s both;
        }

        @keyframes badgePop { 0% { transform: scale(0) rotate(-45deg); opacity: 0; } 100% { transform: scale(1) rotate(0); opacity: 1; } }

        .description { font-size: 16px; font-weight: 500; opacity: 0.75; letter-spacing: 0.4px; }

        /* Premium Link Butonları */
        .links-container { display: flex; flex-direction: column; gap: 16px; perspective: 1000px; }

        .link-btn {
            display: flex; align-items: center; padding: 12px 20px;
            background: var(--glass-bg);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 24px; 
            text-decoration: none; color: var(--text-color);
            font-size: 16px; font-weight: 600;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease, border-color 0.4s ease, background 0.4s ease;
            position: relative; overflow: hidden; opacity: 0;
            transform: translateY(30px); animation: springUp 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            box-shadow: 0 10px 30px var(--shadow-color), inset 0 1px 0 rgba(255,255,255,0.05);
        }

        @keyframes springUp { to { opacity: 1; transform: translateY(0); } }

        /* Fare İmleci Işık Hüzmesi (Spotlight Effect) */
        .link-btn::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(600px circle at var(--mouse-x) var(--mouse-y), rgba(255,255,255,0.08), transparent 40%);
            z-index: 1; opacity: 0; transition: opacity 0.4s ease; pointer-events: none;
        }
        body.light-mode .link-btn::before {
            background: radial-gradient(600px circle at var(--mouse-x) var(--mouse-y), rgba(0,0,0,0.05), transparent 40%);
        }
        .link-btn:hover::before { opacity: 1; }

        .link-btn:hover {
            transform: translateY(-5px) scale(1.015);
            box-shadow: 0 20px 40px var(--shadow-color), inset 0 1px 0 rgba(255,255,255,0.15);
            border-color: rgba(255,255,255,0.25);
            letter-spacing: 0.5px;
        }

        /* İKON KAPSÜLLERİ VE BUTON HOVER RENKLENDİRMELERİ */
        .icon-wrapper {
            width: 48px; height: 48px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            margin-right: 18px; font-size: 20px; transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative; z-index: 2;
        }

        /* 1. Web Sitesi */
        .website .icon-wrapper { background: rgba(59, 130, 246, 0.15); }
        .website .icon-wrapper i { color: var(--color-web); }
        .website:hover { background: rgba(59, 130, 246, 0.06); border-color: rgba(59, 130, 246, 0.4); }
        .website:hover .icon-wrapper { background: var(--color-web); transform: scale(1.15) rotate(8deg); box-shadow: 0 0 20px rgba(59, 130, 246, 0.5); }
        .website:hover .icon-wrapper i { color: #ffffff; }

        /* 2. Instagram */
        .instagram .icon-wrapper { background: rgba(225, 48, 108, 0.15); }
        .instagram .icon-wrapper i { background: linear-gradient(45deg, var(--color-ig-start), #dc2743, var(--color-ig-end)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .instagram:hover { background: rgba(225, 48, 108, 0.06); border-color: rgba(225, 48, 108, 0.4); }
        .instagram:hover .icon-wrapper { background: linear-gradient(45deg, var(--color-ig-start), #dc2743, var(--color-ig-end)); transform: scale(1.15) rotate(8deg); box-shadow: 0 0 20px rgba(225, 48, 108, 0.5); }
        .instagram:hover .icon-wrapper i { background: none; -webkit-text-fill-color: #ffffff; color: #ffffff; }

        /* 3. Facebook */
        .facebook .icon-wrapper { background: rgba(24, 119, 242, 0.15); }
        .facebook .icon-wrapper i { color: var(--color-fb); }
        .facebook:hover { background: rgba(24, 119, 242, 0.06); border-color: rgba(24, 119, 242, 0.4); }
        .facebook:hover .icon-wrapper { background: var(--color-fb); transform: scale(1.15) rotate(8deg); box-shadow: 0 0 20px rgba(24, 119, 242, 0.5); }
        .facebook:hover .icon-wrapper i { color: #ffffff; }

        /* 4. YouTube */
        .youtube .icon-wrapper { background: rgba(255, 0, 0, 0.15); }
        .youtube .icon-wrapper i { color: var(--color-yt); }
        .youtube:hover { background: rgba(255, 0, 0, 0.06); border-color: rgba(255, 0, 0, 0.4); }
        .youtube:hover .icon-wrapper { background: var(--color-yt); transform: scale(1.15) rotate(8deg); box-shadow: 0 0 20px rgba(255, 0, 0, 0.5); }
        .youtube:hover .icon-wrapper i { color: #ffffff; }

        .btn-text { flex: 1; text-align: left; transition: all 0.3s ease; position: relative; z-index: 2; }
        
        .fa-chevron-right { font-size: 14px; opacity: 0.3; transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); position: relative; z-index: 2; }
        .link-btn:hover .fa-chevron-right { opacity: 1; transform: translateX(8px); color: #fff; }

        /* Gelişmiş Giriş Sıralaması */
        .link-btn:nth-child(1) { animation-delay: 0.15s; }
        .link-btn:nth-child(2) { animation-delay: 0.25s; }
        .link-btn:nth-child(3) { animation-delay: 0.35s; }
        .link-btn:nth-child(4) { animation-delay: 0.45s; }

        /* Call To Action (Nefes Alan) Paylaş Butonu */
        .share-btn {
            margin-top: 35px; background: rgba(255,255,255,0.02); 
            border: 1px dashed rgba(255,255,255,0.2);
            color: var(--text-color); font-size: 15px; font-weight: 700;
            cursor: pointer; transition: all 0.4s ease;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            width: 100%; padding: 16px; border-radius: 20px;
            animation: springUp 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards, pulseCTA 3s infinite alternate 1.5s; 
            opacity: 0; transform: translateY(30px); animation-delay: 0.6s;
            backdrop-filter: blur(10px); position: relative; overflow: hidden;
        }

        @keyframes pulseCTA { 0% { box-shadow: 0 0 0 rgba(255,255,255,0); } 100% { box-shadow: 0 0 20px rgba(255,255,255,0.06); } }

        .share-btn i { color: var(--text-color); font-size: 18px; transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
        
        .share-btn:hover { 
            background: var(--glass-bg); transform: translateY(-4px) scale(1.02); 
            border: 1px solid rgba(255,255,255,0.4);
            box-shadow: 0 15px 30px var(--shadow-color);
        }
        .share-btn:hover i { transform: rotate(-15deg) scale(1.2); color: var(--color-web); }

        /* Cam Ayırıcı (Divider) */
        .divider {
            width: 60%; height: 1px; margin: 40px auto 30px auto;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.15), transparent);
            animation: springUp 0.8s forwards; opacity: 0; animation-delay: 0.8s;
        }

        body.light-mode .divider { background: linear-gradient(to right, transparent, rgba(0,0,0,0.1), transparent); }

        /* Footer ve Tıklanabilir MuGöl PORTAL Markası */
        .footer {
            display: flex; flex-direction: column; align-items: center; gap: 10px;
            animation: springUp 0.8s forwards; opacity: 0; animation-delay: 0.9s;
        }

        .footer-text { font-size: 13px; font-weight: 500; opacity: 0.45; letter-spacing: 0.5px; }

        .brand-link { text-decoration: none; display: inline-block; }

        .brand-name {
            font-size: 24px; font-weight: 900; letter-spacing: 1.5px;
            background: linear-gradient(90deg, var(--orb-1), var(--orb-2), var(--orb-4), var(--orb-3), var(--orb-1));
            background-size: 300% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: gradientMove 4s linear infinite;
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.2));
            cursor: pointer; position: relative; transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        body.light-mode .brand-name { background: linear-gradient(90deg, #2563eb, #7c3aed, #ec4899, #059669, #2563eb); background-size: 300% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .brand-link:hover .brand-name { 
            filter: drop-shadow(0 6px 15px rgba(139, 92, 246, 0.4)); 
            transform: scale(1.08) translateY(-2px); 
            letter-spacing: 2.5px;
        }

        @keyframes gradientMove { 0% { background-position: 0% center; } 100% { background-position: 300% center; } }

        /* Özel Toast Bildirimi */
        .toast {
            position: fixed; bottom: -80px; left: 50%; transform: translateX(-50%);
            background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-radius: 20px;
            padding: 14px 28px; color: var(--text-color); font-weight: 600; font-size: 15px;
            display: flex; align-items: center; gap: 12px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
            opacity: 0; visibility: hidden; transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 1000;
        }

        .toast i { color: var(--orb-3); font-size: 20px; }
        .toast.show { bottom: 40px; opacity: 1; visibility: visible; }

    </style>
</head>
<body>

    <!-- Kutup Işıkları (Aurora) -->
    <div class="background-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <!-- Gece / Gündüz Butonu -->
    <button class="theme-toggle" id="themeToggleBtn" title="Temayı Değiştir">
        <i class="fas fa-sun" id="themeIcon"></i>
    </button>

    <div class="container">
        
        <!-- Logo ve Başlık -->
        <div class="profile-wrapper">
            <div class="profile-img-container">
                <div class="profile-img">
                    <img src="logo.png" alt="MuGöl Erişim Logo">
                </div>
            </div>
            <h1 class="title">
                MuGöl Erişim
                <i class="fas fa-check-circle verified-badge" title="Resmi Hesap"></i>
            </h1>
            <p class="description">Dijital dünyadaki tüm bağlantılarımız.</p>
        </div>

        <!-- Yönlendirme Linkleri -->
        <div class="links-container">
            
            <a href="https://mugol-portal.github.io" target="_blank" class="link-btn website">
                <div class="icon-wrapper"><i class="fas fa-globe"></i></div>
                <span class="btn-text">Resmi Web Sitemiz</span>
                <i class="fas fa-chevron-right"></i>
            </a>

            <a href="https://www.instagram.com/mugol_portal?igsh=MXFqNWFmbnE1aGZsaw==" target="_blank" class="link-btn instagram">
                <div class="icon-wrapper"><i class="fab fa-instagram"></i></div>
                <span class="btn-text">Instagram</span>
                <i class="fas fa-chevron-right"></i>
            </a>

            <a href="https://www.facebook.com/share/1H6tTt3zSZ/" target="_blank" class="link-btn facebook">
                <div class="icon-wrapper"><i class="fab fa-facebook-f"></i></div>
                <span class="btn-text">Facebook</span>
                <i class="fas fa-chevron-right"></i>
            </a>

            <a href="https://youtube.com/@mugolportal?si=HmNCscBqMBJPVOCO" target="_blank" class="link-btn youtube">
                <div class="icon-wrapper"><i class="fab fa-youtube"></i></div>
                <span class="btn-text">YouTube</span>
                <i class="fas fa-chevron-right"></i>
            </a>
            
        </div>

        <!-- Paylaş Butonu -->
        <button class="share-btn" onclick="sharePage()">
            <i class="fas fa-share-nodes"></i>
            Bu Sayfayı Paylaş
        </button>

        <!-- Ayırıcı Çizgi -->
        <div class="divider"></div>

        <!-- Footer Alanı (MuGöl PORTAL) -->
        <div class="footer">
            <div class="footer-text">&copy; 2026 MuGöl Erişim. Tüm Hakları Saklıdır.</div>
            <!-- Artık Ana Siteye Yönlendiren Tıklanabilir Link -->
            <a href="https://mugol-portal.github.io" target="_blank" class="brand-link" title="MuGöl Portal'a Git">
                <div class="brand-name">MuGöl PORTAL</div>
            </a>
        </div>
    </div>

    <!-- Özel Bildirim Ekranı (Toast) -->
    <div id="toast" class="toast">
        <i class="fas fa-check-circle"></i>
        <span>Bağlantı kopyalandı!</span>
    </div>

    <!-- JavaScript İşlevleri -->
    <script>
        // Tema Ayarı
        const themeBtn = document.getElementById('themeToggleBtn');
        const themeIcon = document.getElementById('themeIcon');
        const body = document.body;

        themeBtn.addEventListener('click', () => {
            body.classList.toggle('light-mode');
            if(body.classList.contains('light-mode')) {
                themeIcon.classList.remove('fa-sun');
                themeIcon.classList.add('fa-moon');
            } else {
                themeIcon.classList.remove('fa-moon');
                themeIcon.classList.add('fa-sun');
            }
        });

        // Butonlar için Dinamik Işık Hüzmesi (Spotlight) Efekti
        document.querySelectorAll('.link-btn, .share-btn').forEach(btn => {
            btn.addEventListener('mousemove', e => {
                const rect = btn.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                btn.style.setProperty('--mouse-x', `${x}px`);
                btn.style.setProperty('--mouse-y', `${y}px`);
            });
        });

        // Toast Bildirimi Fonksiyonu
        function showToast() {
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000); // 3 saniye sonra kaybolur
        }

        // Paylaşım Menüsü
        function sharePage() {
            if (navigator.share) {
                navigator.share({
                    title: 'MuGöl Erişim',
                    text: 'MuGöl Erişim resmi bağlantılarına göz atın!',
                    url: window.location.href
                }).then(() => {
                    console.log('Başarıyla paylaşıldı');
                }).catch(console.error);
            } else {
                navigator.clipboard.writeText(window.location.href).then(() => {
                    showToast(); // Alert yerine zarif Toast bildirimini gösterir
                });
            }
        }
    </script>
</body>
</html>
